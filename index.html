<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasir — Ming Mart POS</title>
    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
    <link rel="stylesheet" href="dist/css/style.css" />
    <!-- Libraries dimuat dengan crossorigin agar CORS tidak block -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sweetalert2@11"
      crossorigin="anonymous"
    ></script>
    <script>
      // Apply theme before page renders (avoid flash)
      (function () {
        var t = localStorage.getItem("pos_tema") || "dark";
        if (t === "light")
          document.documentElement.setAttribute("data-theme", "light");
      })();
    </script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="container">
      <div class="page-header">
        <div class="page-title">
          <div class="title-icon">🛒</div>
          Kasir
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap">
          <button class="btn btn-ghost btn-sm" onclick="bersihkanKeranjang()">
            🗑 Kosongkan
          </button>
          <button class="btn btn-success btn-sm" onclick="eksporExcel()">
            📊 Ekspor Excel
          </button>
        </div>
      </div>

      <div class="pos-grid">
        <div class="pos-left">
          <div class="section-title">Tambah Produk</div>

          <div class="form-group">
            <label>Pilih Produk</label>
            <select
              id="pilihProduk"
              onchange="updateHargaOtomatis()"
              class="input-custom"
            ></select>
          </div>

          <div class="form-group">
            <label>Harga Satuan</label>
            <div style="position: relative">
              <span
                style="
                  position: absolute;
                  left: 14px;
                  top: 50%;
                  transform: translateY(-50%);
                  font-size: 0.8rem;
                  color: var(--text-muted);
                  font-weight: 600;
                "
                >Rp</span
              >
              <input
                type="number"
                id="hargaProduk"
                class="input-custom"
                readonly
                placeholder="0"
                style="
                  padding-left: 36px;
                  background: var(--bg-elevated);
                  cursor: not-allowed;
                  opacity: 0.7;
                "
              />
            </div>
          </div>

          <div class="form-group">
            <label>Jumlah Beli</label>
            <input
              type="number"
              id="jumlahProduk"
              value="1"
              min="1"
              class="input-custom"
            />
          </div>

          <button
            onclick="tambahKeKeranjang()"
            class="btn btn-primary btn-full btn-lg"
            style="margin-bottom: 12px"
          >
            ➕ Tambah ke Keranjang
          </button>

          <div
            style="
              background: var(--bg-elevated);
              border: 1px solid var(--border);
              border-radius: var(--radius-md);
              padding: 16px;
              margin-top: 8px;
            "
          >
            <div
              style="
                font-size: 0.75rem;
                color: var(--text-muted);
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 12px;
              "
            >
              Ringkasan
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 8px;
              "
            >
              <span style="font-size: 0.8rem; color: var(--text-secondary)"
                >Total Item</span
              >
              <span
                id="cartCount"
                style="
                  font-family: &quot;JetBrains Mono&quot;, monospace;
                  font-size: 0.85rem;
                  font-weight: 700;
                  color: var(--primary-light);
                "
                >0</span
              >
            </div>
            <div style="display: flex; justify-content: space-between">
              <span style="font-size: 0.8rem; color: var(--text-secondary)"
                >Total Bayar</span
              >
              <span
                id="totalHargaSide"
                style="
                  font-family: &quot;JetBrains Mono&quot;, monospace;
                  font-size: 0.85rem;
                  font-weight: 700;
                  color: var(--accent);
                "
                >Rp 0</span
              >
            </div>
          </div>
        </div>

        <div class="pos-right">
          <div class="section-title" style="justify-content: space-between">
            <span>🧾 Daftar Belanja</span>
            <span
              id="cartBadge"
              style="
                background: var(--primary-glow);
                color: var(--primary-light);
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 0.75rem;
                font-weight: 700;
                border: 1px solid rgba(99, 102, 241, 0.3);
              "
              >0 item</span
            >
          </div>

          <div
            class="table-wrapper"
            style="min-height: 200px; margin-bottom: 0"
          >
            <table>
              <thead>
                <tr>
                  <th>Produk</th>
                  <th class="text-center">Qty</th>
                  <th>Subtotal</th>
                  <th class="text-center" style="width: 60px">Hapus</th>
                </tr>
              </thead>
              <tbody id="tabelKeranjang"></tbody>
            </table>
          </div>

          <div class="total-panel">
            <div class="total-row">
              <span class="total-label">Total Pembayaran</span>
            </div>
            <div class="total-amount" id="totalHarga">Rp 0</div>
            <div class="total-divider"></div>
            <button
              onclick="prosesBayar()"
              class="btn btn-accent btn-full btn-lg"
              style="font-size: 1.05rem; font-weight: 800"
            >
              💳 PROSES BAYAR &amp; CETAK STRUK
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Pembayaran -->
    <div
      id="modalBayar"
      class="modal-overlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: var(--bg-card);
          padding: 24px;
          border-radius: var(--radius-lg);
          width: 95%;
          max-width: 400px;
          border: 1px solid var(--border);
          box-shadow: var(--shadow-xl);
        "
      >
        <h3
          style="
            margin-bottom: 20px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
          "
        >
          <span>💰</span> Selesaikan Pembayaran
        </h3>

        <div class="form-group">
          <label>Metode Pembayaran</label>
          <select
            id="metodeBayar"
            class="input-custom"
            onchange="toggleInputUang()"
          >
            <option value="Cash">💵 Cash (Tunai)</option>
            <option value="QRIS">📱 QRIS / Transfer</option>
            <option value="Hutang">📝 Hutang (Bon)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nama Pembeli (Opsional)</label>
          <input
            type="text"
            id="namaPembeli"
            class="input-custom"
            placeholder="Masukkan nama pembeli"
          />
        </div>
        <div class="form-group" id="groupUangBayar">
          <label>Uang Dibayar (Rp)</label>
          <input
            type="number"
            id="nominalBayar"
            class="input-custom"
            placeholder="0"
            oninput="hitungKembalian()"
          />
        </div>

        <div
          style="
            background: var(--bg-elevated);
            padding: 15px;
            border-radius: var(--radius-md);
            margin: 20px 0;
          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.85rem;
              color: var(--text-muted);
              margin-bottom: 5px;
            "
          >
            <span>Total Tagihan:</span>
            <span id="modalTotalTagihan">Rp 0</span>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-weight: 700;
              color: var(--accent);
            "
          >
            <span>Kembalian:</span>
            <span id="textKembalian">Rp 0</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px">
          <button onclick="tutupModalBayar()" class="btn btn-ghost btn-full">
            Batal
          </button>
          <button
            onclick="konfirmasiProsesCetak()"
            class="btn btn-primary btn-full"
          >
            Konfirmasi &amp; Cetak
          </button>
        </div>
      </div>
    </div>

    <script src="dist/js/script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        muatNavbar("nav-kasir");
        renderProdukKasir();
        renderKeranjang();
      });

      // Sinkronisasi ringkasan sisi kiri
      const _origRender = window.renderKeranjang;
      window.renderKeranjang = function () {
        if (typeof _origRender === "function") _origRender();
        setTimeout(() => {
          const totalElem = document.getElementById("totalHarga");
          const sideElem = document.getElementById("totalHargaSide");
          const badge = document.getElementById("cartBadge");
          const count = document.getElementById("cartCount");
          if (totalElem && sideElem)
            sideElem.textContent = totalElem.textContent;
          const n =
            typeof keranjang !== "undefined"
              ? keranjang.reduce((s, i) => s + i.qty, 0)
              : 0;
          if (badge) badge.textContent = `${n} item`;
          if (count) count.textContent = n;
        }, 10);
      };
    </script>
  </body>
</html>
