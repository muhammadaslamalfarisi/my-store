<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasir — Ming Mart POS</title>
    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="dist/css/style.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        var t = localStorage.getItem("pos_tema") || "light";
        document.documentElement.classList.add(
          t === "dark" ? "dark-mode" : "light-mode",
        );
      })();
    </script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <!-- Header -->
      <div class="content-header">
        <h1><i class="fa fa-shopping-cart"></i> Kasir</h1>
        <div
          style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap"
        >
          <button class="btn btn-default btn-sm" onclick="bersihkanKeranjang()">
            <i class="fa fa-trash"></i> Kosongkan
          </button>
          <button class="btn btn-success btn-sm" onclick="eksporExcel()">
            <i class="fa fa-file-excel-o"></i> Ekspor Excel
          </button>
        </div>
      </div>

      <!-- POS Layout -->
      <div class="pos-layout">
        <!-- LEFT: Input Panel -->
        <div>
          <!-- Add Product Box -->
          <div class="box box-primary">
            <div class="box-header with-border">
              <h3 class="box-title">
                <i class="fa fa-plus-circle"></i> Tambah Produk
              </h3>
            </div>
            <div class="box-body">
              <div class="form-group">
                <label>Pilih Produk</label>
                <select
                  id="pilihProduk"
                  class="form-control"
                  onchange="updateHargaOtomatis()"
                ></select>
              </div>
              <div class="form-group">
                <label>Harga Satuan</label>
                <div class="input-group">
                  <span class="input-group-addon">Rp</span>
                  <input
                    type="number"
                    id="hargaProduk"
                    class="form-control"
                    readonly
                    placeholder="0"
                    style="cursor: not-allowed"
                  />
                </div>
              </div>
              <div class="form-group">
                <label>Jumlah Beli</label>
                <input
                  type="number"
                  id="jumlahProduk"
                  value="1"
                  min="1"
                  class="form-control"
                />
              </div>
              <button
                onclick="tambahKeKeranjang()"
                class="btn btn-primary btn-block"
              >
                <i class="fa fa-cart-plus"></i> Tambah ke Keranjang
              </button>
            </div>
          </div>

          <!-- Diskon Box -->
          <div class="box box-warning">
            <div class="box-header with-border">
              <h3 class="box-title"><i class="fa fa-tag"></i> Diskon</h3>
            </div>
            <div class="box-body" style="padding: 12px 15px">
              <div class="input-group">
                <span class="input-group-addon">Rp</span>
                <input
                  type="number"
                  id="inputDiskon"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
                <span class="input-group-btn">
                  <button class="btn btn-warning" onclick="terapkanDiskon()">
                    Terapkan
                  </button>
                </span>
              </div>
            </div>
          </div>

          <!-- Ringkasan -->
          <div class="box box-default">
            <div class="box-header with-border">
              <h3 class="box-title">
                <i class="fa fa-list-alt"></i> Ringkasan
              </h3>
            </div>
            <div class="box-body">
              <table style="width: 100%; font-size: 13px">
                <tr>
                  <td style="padding: 5px 0; color: var(--text-muted)">
                    Total Item
                  </td>
                  <td
                    style="padding: 5px 0; text-align: right; font-weight: 700"
                    id="cartCount"
                  >
                    0
                  </td>
                </tr>
                <tr>
                  <td style="padding: 5px 0; color: var(--text-muted)">
                    Subtotal
                  </td>
                  <td
                    style="padding: 5px 0; text-align: right; font-weight: 700"
                    id="subtotalHarga"
                  >
                    Rp 0
                  </td>
                </tr>
                <tr>
                  <td style="padding: 5px 0; color: #f39c12">Diskon</td>
                  <td
                    style="
                      padding: 5px 0;
                      text-align: right;
                      font-weight: 700;
                      color: #f39c12;
                    "
                    id="diskonHarga"
                  >
                    - Rp 0
                  </td>
                </tr>
                <tr style="border-top: 1px solid var(--box-border)">
                  <td style="padding: 8px 0; font-weight: 700; font-size: 15px">
                    Total Bayar
                  </td>
                  <td
                    style="
                      padding: 8px 0;
                      text-align: right;
                      font-weight: 700;
                      font-size: 15px;
                      color: #3c8dbc;
                    "
                    id="totalHargaSide"
                  >
                    Rp 0
                  </td>
                </tr>
              </table>
            </div>
          </div>
        </div>

        <!-- RIGHT: Cart -->
        <div>
          <div class="box box-default">
            <div class="box-header with-border">
              <h3 class="box-title">
                <i class="fa fa-shopping-basket"></i> Keranjang Belanja
              </h3>
              <div class="box-tools">
                <span class="badge bg-blue" id="cartBadge">0 item</span>
              </div>
            </div>
            <div class="box-body" style="padding: 0">
              <div class="table-responsive">
                <table class="table table-hover" style="margin-bottom: 0">
                  <thead>
                    <tr>
                      <th>Produk</th>
                      <th class="text-center" style="width: 120px">Jumlah</th>
                      <th class="text-right">Harga</th>
                      <th class="text-right">Subtotal</th>
                      <th class="text-center" style="width: 50px">×</th>
                    </tr>
                  </thead>
                  <tbody id="tabelKeranjang"></tbody>
                </table>
              </div>
            </div>
            <!-- Total Panel -->
            <div class="box-footer" style="padding: 0">
              <div class="total-panel">
                <div class="label-total">Total Pembayaran</div>
                <div class="amount-total" id="totalHarga">Rp 0</div>
                <button
                  onclick="prosesBayar()"
                  class="btn btn-block"
                  style="
                    background: #fff;
                    color: #3c8dbc;
                    font-weight: 800;
                    font-size: 15px;
                    border: none;
                    padding: 12px;
                  "
                >
                  <i class="fa fa-credit-card"></i> PROSES BAYAR &amp; CETAK
                  STRUK
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Pembayaran -->
    <div id="modalBayar" class="modal-overlay" style="display: none">
      <div class="modal-box" style="max-width: 420px">
        <div
          class="modal-header"
          style="border-top: 3px solid #00a65a; border-radius: 4px 4px 0 0"
        >
          <div class="modal-title">
            <i class="fa fa-money text-success"></i> Selesaikan Pembayaran
          </div>
          <button class="modal-close" onclick="tutupModalBayar()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Metode Pembayaran</label>
            <select
              id="metodeBayar"
              class="form-control"
              onchange="toggleInputUang()"
            >
              <option value="Cash">💵 Cash (Tunai)</option>
              <option value="QRIS">📱 QRIS</option>
              <option value="Transfer">🏦 Transfer Bank</option>
              <option value="Hutang">📝 Hutang (Bon)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nama Pembeli (Opsional)</label>
            <input
              type="text"
              id="namaPembeli"
              class="form-control"
              placeholder="Masukkan nama pembeli"
            />
          </div>
          <div class="form-group" id="groupUangBayar">
            <label>Uang Dibayar (Rp)</label>
            <div class="input-group">
              <span class="input-group-addon">Rp</span>
              <input
                type="number"
                id="nominalBayar"
                class="form-control"
                placeholder="0"
                oninput="hitungKembalian()"
              />
            </div>
          </div>
          <div
            style="
              background: var(--table-stripe);
              border-radius: 4px;
              padding: 14px;
              margin-top: 6px;
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                color: var(--text-muted);
                margin-bottom: 6px;
              "
            >
              <span>Total Tagihan:</span>
              <strong id="modalTotalTagihan">Rp 0</strong>
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                font-size: 16px;
                font-weight: 700;
              "
            >
              <span>Kembalian:</span>
              <span id="textKembalian" style="color: #00a65a">Rp 0</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button onclick="tutupModalBayar()" class="btn btn-default">
            Batal
          </button>
          <button onclick="konfirmasiProsesCetak()" class="btn btn-success">
            <i class="fa fa-check"></i> Konfirmasi &amp; Cetak
          </button>
        </div>
      </div>
    </div>

    <script src="dist/js/script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        muatNavbar("nav-kasir");
        renderProdukKasir();
        renderKeranjang();
      });
    </script>
  </body>
</html>
