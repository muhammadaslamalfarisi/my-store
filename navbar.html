<!-- Modal Kelola Akun Admin -->
<div id="modalAkun" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">⚙️ Kelola Akun Admin</div>
      <button class="modal-close" onclick="tutupModalAkun()">✕</button>
    </div>

    <div class="form-group">
      <label>Username Baru</label>
      <input
        type="text"
        id="updateUsername"
        class="input-custom"
        placeholder="Masukkan username baru"
      />
    </div>
    <div class="form-group">
      <label>Password Baru</label>
      <input
        type="password"
        id="updatePassword"
        class="input-custom"
        placeholder="Min. 5 karakter"
      />
    </div>

    <div
      style="
        background: var(--warning-bg);
        border: 1px solid rgba(245, 158, 11, 0.2);
        border-radius: var(--radius-sm);
        padding: 12px;
        margin-bottom: 4px;
      "
    >
      <p style="font-size: 0.78rem; color: var(--warning); margin: 0">
        ⚠️ Setelah disimpan, Anda akan diminta login ulang.
      </p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="tutupModalAkun()">Batal</button>
      <button class="btn btn-primary" onclick="simpanPerubahanAkun()">
        💾 Simpan Perubahan
      </button>
    </div>
  </div>
</div>
