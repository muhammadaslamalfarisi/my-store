<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Produk — Ming Mart POS</title>
    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="dist/css/style.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        var t = localStorage.getItem("pos_tema") || "light";
        document.documentElement.classList.add(
          t === "dark" ? "dark-mode" : "light-mode",
        );
      })();
    </script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="content-wrapper">
      <div class="content-header">
        <h1><i class="fa fa-cubes"></i> Manajemen Stok Produk</h1>
        <div id="produkStat"></div>
      </div>

      <!-- Add Product Box -->
      <div class="box box-primary">
        <div class="box-header with-border">
          <h3 class="box-title">
            <i class="fa fa-plus"></i> Tambah Produk Baru
          </h3>
          <div class="box-tools">
            <button
              class="btn btn-success btn-sm"
              onclick="eksporProdukExcel()"
            >
              <i class="fa fa-file-excel-o"></i> Ekspor Excel
            </button>
          </div>
        </div>
        <div class="box-body">
          <div class="row">
            <div class="col-md-3">
              <div class="form-group mb-0">
                <label>Nama Produk <span class="text-danger">*</span></label>
                <input
                  type="text"
                  id="newNama"
                  class="form-control"
                  placeholder="Contoh: Kopi Susu"
                  onkeydown="if (event.key === 'Enter') tambahProdukBaru();"
                />
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group mb-0">
                <label
                  >Harga Jual (Rp) <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  id="newHarga"
                  class="form-control"
                  placeholder="15000"
                  min="0"
                />
              </div>
            </div>
            <div class="col-md-2">
              <div class="form-group mb-0">
                <label>Stok Awal</label>
                <input
                  type="number"
                  id="newStok"
                  class="form-control"
                  value="0"
                  min="0"
                />
              </div>
            </div>
            <div class="col-md-2">
              <div class="form-group mb-0">
                <label>Kategori</label>
                <select id="newKategori" class="form-control">
                  <option>Makanan</option>
                  <option>Minuman</option>
                  <option>Snack</option>
                  <option>Lainnya</option>
                </select>
              </div>
            </div>
            <div class="col-md-1">
              <div class="form-group mb-0">
                <label>Satuan</label>
                <input
                  type="text"
                  id="newSatuan"
                  class="form-control"
                  placeholder="pcs"
                  value="pcs"
                />
              </div>
            </div>
            <div class="col-md-1">
              <div class="form-group mb-0">
                <label style="opacity: 0">‎</label>
                <button
                  onclick="tambahProdukBaru()"
                  class="btn btn-primary btn-block"
                >
                  <i class="fa fa-plus"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Product List -->
      <div class="box box-default">
        <div class="box-header with-border">
          <h3 class="box-title"><i class="fa fa-list"></i> Daftar Produk</h3>
          <div class="box-tools" style="align-items: center">
            <div class="input-group input-group-sm" style="width: 240px">
              <span class="input-group-addon"
                ><i class="fa fa-search"></i
              ></span>
              <input
                type="text"
                class="form-control"
                placeholder="Cari produk..."
                oninput="renderTabelStok(this.value)"
                id="searchProduk"
              />
            </div>
            <select
              class="form-control"
              style="
                width: 130px;
                height: 30px;
                font-size: 12px;
                margin-left: 6px;
              "
              onchange="filterKategori(this.value)"
            >
              <option value="">Semua Kategori</option>
              <option>Makanan</option>
              <option>Minuman</option>
              <option>Snack</option>
              <option>Lainnya</option>
            </select>
          </div>
        </div>
        <div class="box-body" style="padding: 0">
          <div class="table-responsive">
            <table
              class="table table-striped table-hover"
              style="margin-bottom: 0"
            >
              <thead>
                <tr>
                  <th style="width: 40px">#</th>
                  <th style="width: 70px">ID</th>
                  <th>Nama Produk</th>
                  <th style="width: 100px">Kategori</th>
                  <th class="text-right" style="width: 120px">Harga Jual</th>
                  <th class="text-center" style="width: 100px">Stok</th>
                  <th class="text-center" style="width: 90px">Aksi</th>
                </tr>
              </thead>
              <tbody id="bodyStok">
                <tr>
                  <td
                    colspan="7"
                    class="text-center"
                    style="padding: 40px; color: #999"
                  >
                    <i class="fa fa-spinner fa-spin"></i> Memuat data...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Edit Produk -->
    <div id="modalEdit" class="modal-overlay" style="display: none">
      <div class="modal-box" style="max-width: 460px">
        <div
          class="modal-header"
          style="border-top: 3px solid #f39c12; border-radius: 4px 4px 0 0"
        >
          <div class="modal-title">
            <i class="fa fa-pencil text-warning"></i> Edit Data Produk
          </div>
          <button class="modal-close" onclick="tutupModalEdit()">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Nama Produk</label>
                <input
                  type="text"
                  id="editNama"
                  class="form-control"
                  placeholder="Nama produk"
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Kategori</label>
                <select id="editKategori" class="form-control">
                  <option>Makanan</option>
                  <option>Minuman</option>
                  <option>Snack</option>
                  <option>Lainnya</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Harga Jual (Rp)</label>
                <input
                  type="number"
                  id="editHarga"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>Jumlah Stok</label>
                <input
                  type="number"
                  id="editStok"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>Satuan</label>
                <input
                  type="text"
                  id="editSatuan"
                  class="form-control"
                  placeholder="pcs"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-default" onclick="tutupModalEdit()">
            Batal
          </button>
          <button class="btn btn-warning" onclick="simpanPerubahan()">
            <i class="fa fa-save"></i> Simpan
          </button>
        </div>
      </div>
    </div>

    <script src="dist/js/script.js"></script>
    <script>
      var currentFilter = "";

      function filterKategori(kat) {
        currentFilter = kat;
        renderTabelStok(
          document.getElementById("searchProduk")?.value || "",
          kat,
        );
      }

      document.addEventListener("DOMContentLoaded", () => {
        muatNavbar("nav-stok");
        renderTabelStok();
        updateProdukStat();
      });

      document
        .getElementById("modalEdit")
        ?.addEventListener("click", function (e) {
          if (e.target === this) tutupModalEdit();
        });
    </script>
  </body>
</html>
